<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #111;
    color: #c8c8c8;
    font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
    min-height: 100vh;
    min-height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    -webkit-font-smoothing: antialiased;
    -webkit-text-size-adjust: 100%;
  }

  main {
    max-width: 480px;
    width: 100%;
    padding: 2rem;
    padding-top: max(2rem, env(safe-area-inset-top));
    padding-bottom: max(2rem, env(safe-area-inset-bottom));
    padding-left: max(1.25rem, env(safe-area-inset-left));
    padding-right: max(1.25rem, env(safe-area-inset-right));
  }

  .date-wrapper {
    position: relative;
    margin-bottom: 3rem;
    cursor: pointer;
    display: inline-block;
  }

  .date {
    font-size: 0.75rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #555;
  }

  .date-wrapper input {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    cursor: pointer;
    -webkit-appearance: none;
    color-scheme: dark;
    font-size: 1rem;
  }

  .date-wrapper input::-webkit-calendar-picker-indicator {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    margin: 0;
    padding: 0;
    cursor: pointer;
    opacity: 0;
  }

  h2 {
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #777;
  }


  #priorities {
    list-style: none;
    margin-bottom: 1rem;
  }

  #priorities li {
    display: flex;
    align-items: center;
    padding: 0.75rem 0;
    border-bottom: 1px solid #1e1e1e;
    font-size: 0.95rem;
    cursor: grab;
    user-select: none;
    touch-action: none;
  }

  #priorities li.dragging {
    opacity: 0.3;
  }

  #priorities li .drag-handle {
    color: #333;
    margin-right: 0.6rem;
    cursor: grab;
    flex-shrink: 0;
    font-size: 0.85rem;
    padding: 0.25rem 0.15rem;
  }

  #priorities li .text {
    flex: 1;
    color: #ccc;
    outline: none;
    border: none;
    background: none;
    font: inherit;
    min-width: 0;
  }

  #priorities li .text:empty::before {
    content: attr(data-placeholder);
    color: #333;
  }

  #priorities li.done .text {
    text-decoration: line-through;
    color: #444;
  }

  #priorities li .check {
    width: 20px;
    height: 20px;
    border: 1px solid #333;
    border-radius: 4px;
    margin-right: 0.6rem;
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.65rem;
    color: transparent;
  }

  #priorities li.done .check {
    border-color: #444;
    color: #555;
  }

  #priorities li.migrated {
    opacity: 0.35;
    pointer-events: none;
  }

  #priorities li.migrated .text {
    text-decoration: none;
    color: #555;
  }

  #priorities li.migrated .migrated-label {
    font-size: 0.65rem;
    color: #444;
    margin-left: 0.4rem;
    white-space: nowrap;
  }

  #priorities li .delete {
    color: #444;
    cursor: pointer;
    margin-left: 0.5rem;
    font-size: 0.9rem;
    flex-shrink: 0;
    padding: 0.25rem 0.35rem;
  }

  @media (hover: hover) {
    #priorities li .delete {
      opacity: 0;
      transition: opacity 0.15s;
    }
    #priorities li:hover .delete {
      opacity: 1;
    }
    #priorities li .delete:hover {
      color: #666;
    }
  }

  #add-btn {
    background: none;
    border: 1px solid #1e1e1e;
    color: #444;
    font: inherit;
    font-size: 0.85rem;
    padding: 0.55rem 1rem;
    cursor: pointer;
    margin-bottom: 4rem;
    transition: color 0.15s, border-color 0.15s;
  }

  #add-btn:hover {
    color: #777;
    border-color: #333;
  }

  .quote {
    font-size: 0.8rem;
    line-height: 1.7;
    color: #706f6f;
    font-style: italic;
    border-left: 2px solid #2a2a2a;
    padding-left: 1rem;
  }

  .quote .attr {
    display: block;
    margin-top: 0.5rem;
    font-style: normal;
    font-size: 0.7rem;
    color: #504f4f;
  }
</style>
</head>
<body>
<main>
  <div class="date-wrapper">
    <p class="date" id="date"></p>
    <input type="date" id="date-pick">
  </div>

  <h2>Today's Priorities</h2>
  <ul id="priorities"></ul>
  <button id="add-btn">+ add</button>

  <div class="quote" id="quote"></div>
</main>

<script>
  // Helpers
  function toKey(dateStr) { return 'prio-' + dateStr; }
  function todayStr() {
    const t = new Date();
    return t.getFullYear() + '-' + String(t.getMonth()+1).padStart(2,'0') + '-' + String(t.getDate()).padStart(2,'0');
  }

  // Date
  const dateLabel = document.getElementById('date');
  const datePick = document.getElementById('date-pick');
  const fmtOpts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  let activeDate = todayStr();

  function displayDate(dateStr) {
    const parts = dateStr.split('-');
    const dt = new Date(parts[0], parts[1] - 1, parts[2]);
    dateLabel.textContent = dt.toLocaleDateString('en-US', fmtOpts);
  }

  datePick.value = activeDate;
  displayDate(activeDate);

  datePick.addEventListener('change', function() {
    activeDate = datePick.value;
    displayDate(activeDate);
    loadDate(activeDate);
  });

  // Quote
  const quotes = [
    ["You have power over your mind, not outside events. Realize this, and you will find strength.", "Marcus Aurelius"],
    ["Waste no more time arguing about what a good man should be. Be one.", "Marcus Aurelius"],
    ["The happiness of your life depends upon the quality of your thoughts.", "Marcus Aurelius"],
    ["Very little is needed to make a happy life; it is all within yourself, in your way of thinking.", "Marcus Aurelius"],
    ["We suffer more often in imagination than in reality.", "Seneca"],
    ["It is not that we have a short time to live, but that we waste a great deal of it.", "Seneca"],
    ["Luck is what happens when preparation meets opportunity.", "Seneca"],
    ["Difficulty strengthens the mind, as labor does the body.", "Seneca"],
    ["Man is not worried by real problems so much as by his imagined anxieties about real problems.", "Epictetus"],
    ["First say to yourself what you would be; and then do what you have to do.", "Epictetus"],
    ["It's not what happens to you, but how you react to it that matters.", "Epictetus"],
    ["No man is free who is not master of himself.", "Epictetus"],
  ];
  const q = quotes[Math.floor(Math.random() * quotes.length)];
  document.getElementById('quote').innerHTML = q[0] + '<span class="attr">' + q[1] + '</span>';

  // Priorities
  const list = document.getElementById('priorities');
  let dragEl = null;

  function createItem(text) {
    const li = document.createElement('li');
    li.draggable = true;
    li.innerHTML =
      '<span class="drag-handle">\u2261</span>' +
      '<span class="check">\u2713</span>' +
      '<span class="text" contenteditable="true" data-placeholder="..."></span>' +
      '<span class="delete">\u00d7</span>';
    li.querySelector('.text').textContent = text || '';

    li.querySelector('.check').addEventListener('click', function() {
      li.classList.toggle('done');
      save();
    });

    li.querySelector('.delete').addEventListener('click', function() {
      li.remove();
      save();
    });

    li.querySelector('.text').addEventListener('input', save);

    li.setMigrated = function() {
      li.classList.add('migrated');
      li.draggable = false;
      li.querySelector('.text').contentEditable = 'false';
      const label = document.createElement('span');
      label.className = 'migrated-label';
      label.textContent = 'moved \u2192';
      li.querySelector('.text').after(label);
      li.querySelector('.delete').remove();
    };

    // Desktop drag
    li.addEventListener('dragstart', function(e) {
      dragEl = li;
      li.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });

    li.addEventListener('dragend', function() {
      li.classList.remove('dragging');
      dragEl = null;
      save();
    });

    li.addEventListener('dragover', function(e) {
      e.preventDefault();
      if (dragEl && dragEl !== li) {
        const rect = li.getBoundingClientRect();
        const mid = rect.top + rect.height / 2;
        if (e.clientY < mid) {
          list.insertBefore(dragEl, li);
        } else {
          list.insertBefore(dragEl, li.nextSibling);
        }
      }
    });

    // Touch drag (via handle only)
    const handle = li.querySelector('.drag-handle');
    handle.addEventListener('touchstart', function(e) {
      dragEl = li;
      li.classList.add('dragging');
      e.preventDefault();
    }, { passive: false });

    handle.addEventListener('touchmove', function(e) {
      if (!dragEl) return;
      e.preventDefault();
      const touch = e.touches[0];
      const target = document.elementFromPoint(touch.clientX, touch.clientY);
      if (!target) return;
      const targetLi = target.closest('#priorities li');
      if (targetLi && targetLi !== dragEl) {
        const rect = targetLi.getBoundingClientRect();
        const mid = rect.top + rect.height / 2;
        if (touch.clientY < mid) {
          list.insertBefore(dragEl, targetLi);
        } else {
          list.insertBefore(dragEl, targetLi.nextSibling);
        }
      }
    }, { passive: false });

    handle.addEventListener('touchend', function() {
      if (dragEl) {
        dragEl.classList.remove('dragging');
        dragEl = null;
        save();
      }
    });

    return li;
  }

  function save() {
    const items = [...list.querySelectorAll('li')].map(li => ({
      text: li.querySelector('.text').textContent,
      done: li.classList.contains('done')
    }));
    localStorage.setItem(toKey(activeDate), JSON.stringify(items));
  }

  function loadDate(dateStr) {
    list.innerHTML = '';
    const data = localStorage.getItem(toKey(dateStr));
    if (data) {
      JSON.parse(data).forEach(item => {
        const li = createItem(item.text);
        if (item.done) li.classList.add('done');
        if (item.migrated) li.setMigrated();
        list.appendChild(li);
      });
    } else {
      for (let i = 0; i < 3; i++) list.appendChild(createItem(''));
    }
  }

  // Migrate old single-key data to today's date key
  const legacy = localStorage.getItem('priorities');
  if (legacy && !localStorage.getItem(toKey(todayStr()))) {
    localStorage.setItem(toKey(todayStr()), legacy);
    localStorage.removeItem('priorities');
  }

  // Move unchecked items from past dates to today
  function migrateUnchecked() {
    const today = todayStr();
    const todayKey = toKey(today);

    const pastKeys = [];
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key && key.startsWith('prio-') && key.slice(5) < today) {
        pastKeys.push(key);
      }
    }
    if (pastKeys.length === 0) return;

    let todayItems = [];
    const existing = localStorage.getItem(todayKey);
    if (existing) todayItems = JSON.parse(existing);

    let migrated = false;

    pastKeys.forEach(key => {
      const items = JSON.parse(localStorage.getItem(key));
      const unchecked = items.filter(item => !item.done && !item.migrated && item.text.trim() !== '');

      if (unchecked.length > 0) {
        todayItems = [...unchecked, ...todayItems];
        migrated = true;
        // Mark them as migrated in the past date's data
        const updated = items.map(item => {
          if (!item.done && !item.migrated && item.text.trim() !== '') {
            return { ...item, migrated: true };
          }
          return item;
        });
        localStorage.setItem(key, JSON.stringify(updated));
      }
    });

    if (migrated) {
      localStorage.setItem(todayKey, JSON.stringify(todayItems));
    }
  }

  migrateUnchecked();
  loadDate(activeDate);

  document.getElementById('add-btn').addEventListener('click', function() {
    const item = createItem('');
    list.appendChild(item);
    item.querySelector('.text').focus();
    save();
  });
</script>
</body>
</html>
